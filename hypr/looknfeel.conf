# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_out: top right bottom left — top 0 so windows sit flush under the taskbar
    gaps_in = 2
    gaps_out = 3, 7, 7, 7
    border_size = 1

    # Scrolling layout: columns on an infinite horizontal tape
    # https://wiki.hypr.land/Configuring/Scrolling-Layout/
    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Scrolling-Layout/#config
scrolling {
    direction = right
    column_width = 0.5
    follow_focus = true
    fullscreen_on_one_column = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 6
    rounding_power = 4.0
    active_opacity = 0.9
    inactive_opacity = 0.8
    blur {
        size = 5
        passes = 5
        special = true
        popups = true
        input_methods = true
    }
}
# Layer shell apps (Waybar, Walker menus)
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace omarchy-frame
layerrule = ignore_alpha 0.2, match:namespace omarchy-frame
layerrule = blur on, match:namespace omarchy-shell-visual
layerrule = ignore_alpha 0.2, match:namespace omarchy-shell-visual
layerrule = blur on, match:namespace omni-menu
layerrule = ignore_alpha 0.2, match:namespace omni-menu
layerrule = blur on, match:namespace omarchy-tooltip
layerrule = ignore_alpha 0.2, match:namespace omarchy-tooltip
layerrule = blur on, match:namespace omarchy-card
layerrule = ignore_alpha 0.2, match:namespace omarchy-card
layerrule = blur on, match:namespace omarchy-system
layerrule = ignore_alpha 0.2, match:namespace omarchy-system
# Calendar/media are drawn by Quickshell as content-only overlays. Their
# shared glass background lives in omarchy-shell-visual so it blurs as one
# continuous surface with the frame.
layerrule = blur on, match:namespace omarchy-screenshots
layerrule = ignore_alpha 0.2, match:namespace omarchy-screenshots
layerrule = blur on, match:namespace omarchy-videos
layerrule = ignore_alpha 0.2, match:namespace omarchy-videos
layerrule = blur on, match:namespace omarchy-display
layerrule = ignore_alpha 0.2, match:namespace omarchy-display
layerrule = blur on, match:namespace omarchy-weather
layerrule = ignore_alpha 0.2, match:namespace omarchy-weather
layerrule = blur on, match:namespace omarchy-aether
layerrule = ignore_alpha 0.2, match:namespace omarchy-aether
layerrule = blur on, match:namespace btop
# Blur for Walker blurs the whole layer (fullscreen); menu-only look uses Walker theme background instead
layerrule = blur on, match:namespace walker

# Motion (position/size): Omarchy default SPEED × 0.5 (2× as fast). Fades + border color: Omarchy defaults unchanged.
# https://wiki.hypr.land/Configuring/Animations/
animations {
    animation = global, 1, 5, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 2.4, easeOutQuint
    animation = windowsMove, 1, 2, easeOutQuint
    animation = windowsIn, 1, 2, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1, linear, popin 87%
    animation = layers, 1, 2, easeOutQuint
    animation = layersIn, 1, 2, easeOutQuint, fade
    animation = layersOut, 1, 1, linear, fade
    animation = workspaces, 0, 0, ease
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

windowrule = match:class helium, opacity 1.0 override 0.9 override
windowrule = match:class cursor, opacity 1.0 override 0.9 override
windowrule = match:class zen, opacity 1.0 override 0.95 override
windowrule = match:class vivaldi-stable, opacity 1.0 override 0.95 override
windowrule = match:class t3-code-desktop, opacity 1.0 override 0.95 override
