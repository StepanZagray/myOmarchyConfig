# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    gaps_in = 1
    gaps_out = 2
    border_size = 1

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 6
    rounding_power = 4.0
    active_opacity = 0.85
    inactive_opacity = 0.8
    blur {
        size = 5
        passes = 5
        special = true
        popups = true
        input_methods = true
    }
}
# Layer shell apps (Waybar, Walker menus)
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace btop
# Blur for Walker blurs the whole layer (fullscreen); menu-only look uses Walker theme background instead
layerrule = blur on, match:namespace walker
# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

windowrule = match:class helium, opacity 1.0 override 0.9 override
windowrule = match:class vivaldi-stable, opacity 1.0 override 0.95 override
windowrule = match:class cursor, opacity 1.0 override 0.9 override
